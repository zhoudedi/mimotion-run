name: 刷步数

on:
  push:
  with open("log.txt", "a", encoding="utf-8") as log_file:log_file.write(f"{current_time}-{'Success' if success else 'Failed'}-{execution_time:.2f}s\n")
  branches: [ master ]
  pull_request:
  branches: [ master ]
  schedule:
    - cron: '13 22,0,2,4,6,8,10,12,14 * * *'
  watch:
    types: started
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codes
        uses: actions/checkout@v4
      - name: Update system and install zsh
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get install zsh -y
          
      - name: 初始化Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.8
      - name: 开始
        env:
          CONFIG: ${{ secrets.CONFIG }}
        run: |
          pip install --upgrade pip
          pip3 install requests
          python3 main.py
